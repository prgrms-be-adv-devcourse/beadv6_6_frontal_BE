# 인프라 서비스 CI (apigateway, config, discovery)
# 비즈니스 로직이 거의 없으므로 하나로 묶어 관리
name: CI - Infra

on:
  push:
    branches: [ develop ]
    paths:
      - 'apigateway/**'
      - 'config/**'
      - 'discovery/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'apigateway/**'
      - 'config/**'
      - 'discovery/**'

concurrency:
  group: ci-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      apigateway: ${{ steps.filter.outputs.apigateway }}
      config: ${{ steps.filter.outputs.config }}
      discovery: ${{ steps.filter.outputs.discovery }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apigateway:
              - 'apigateway/**'
            config:
              - 'config/**'
            discovery:
              - 'discovery/**'

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: apigateway
            changed: ${{ needs.detect-changes.outputs.apigateway }}
          - service: config
            changed: ${{ needs.detect-changes.outputs.config }}
          - service: discovery
            changed: ${{ needs.detect-changes.outputs.discovery }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Set up JDK 21
        if: matrix.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        if: matrix.changed == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles(format('{0}/build.gradle', matrix.service)) }}
          restore-keys: ${{ runner.os }}-gradle-${{ matrix.service }}-

      - name: Grant execute permission
        if: matrix.changed == 'true'
        run: chmod +x ${{ matrix.service }}/gradlew

