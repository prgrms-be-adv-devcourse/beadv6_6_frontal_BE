# Payment Service CI
name: CI - Payment

on:
  push:
    branches: [ develop ]
    paths:
      - 'payment/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'payment/**'

concurrency:
  group: ci-payment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-payment-${{ hashFiles('payment/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-payment-

      - name: Grant execute permission
        run: chmod +x payment/gradlew

      - name: Build and Test
        working-directory: payment
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-payment
          path: payment/build/reports/tests/
