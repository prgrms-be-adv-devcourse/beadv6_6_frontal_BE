# Auction Service CI
name: CI - Auction

on:
  push:
    branches: [ develop ]
    paths:
      - 'auction/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'auction/**'

concurrency:
  group: ci-auction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: biddy
          POSTGRES_PASSWORD: biddy1234
          POSTGRES_DB: biddy_auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U biddy -d biddy_auction"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-auction-${{ hashFiles('auction/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-auction-

      - name: Grant execute permission
        run: chmod +x auction/gradlew

      - name: Build and Test
        working-directory: auction
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          AUCTION_DB: biddy_auction
          POSTGRES_USER: biddy
          POSTGRES_PASSWORD: biddy1234
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          EUREKA_CLIENT_ENABLED: false
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-auction
          path: auction/build/reports/tests/
          retention-days: 7
