# Auction Service CI
name: CI - Auction

on:
  push:
    branches: [ develop ]
    paths:
      - 'auction/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'auction/**'

concurrency:
  group: ci-auction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-auction-${{ hashFiles('auction/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-auction-

      - name: Grant execute permission
        run: chmod +x auction/gradlew

      - name: Build and Test
        working-directory: auction
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-auction
          path: auction/build/reports/tests/
          retention-days: 7