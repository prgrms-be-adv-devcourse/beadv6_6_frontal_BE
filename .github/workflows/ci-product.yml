# Product Service CI
name: CI - Product

on:
  push:
    branches: [ develop ]
    paths:
      - 'product/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'product/**'

concurrency:
  group: ci-product-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-product-${{ hashFiles('product/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-product-

      - name: Grant execute permission
        run: chmod +x product/gradlew

      - name: Build and Test
        working-directory: product
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-product
          path: product/build/reports/tests/
