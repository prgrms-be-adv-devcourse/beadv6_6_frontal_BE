# Member Service CI
name: CI - Member

on:
  push:
    branches: [ develop ]
    paths:
      - 'member/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'member/**'

concurrency:
  group: ci-member-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-member-${{ hashFiles('member/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-member-

      - name: Grant execute permission
        run: chmod +x member/gradlew

      - name: Build and Test
        working-directory: member
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-member
          path: member/build/reports/tests/
          retention-days: 7
