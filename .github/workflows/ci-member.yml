# Member Service CI
name: CI - Member

on:
  push:
    branches: [ develop ]
    paths:
      - 'member/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'member/**'

concurrency:
  group: ci-member-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: biddy
          POSTGRES_PASSWORD: biddy1234
          POSTGRES_DB: biddy_member
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U biddy -d biddy_member"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-member-${{ hashFiles('member/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-member-

      - name: Grant execute permission
        run: chmod +x member/gradlew

      - name: Create member_biddy schema
        env:
          PGPASSWORD: biddy1234
        run: psql -h localhost -U biddy -d biddy_member -c "CREATE SCHEMA IF NOT EXISTS member_biddy;"

      - name: Build and Test
        working-directory: member
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          MEMBER_DB: biddy_member
          POSTGRES_USER: biddy
          POSTGRES_PASSWORD: biddy1234
          JWT_SECRET: test-secret-key-for-ci-pipeline-do-not-use-in-prod-1234567890
          MAIL_USERNAME: ci-test@example.com
          MAIL_PASSWORD: ci-test-password
          EUREKA_CLIENT_ENABLED: false
          SPRING_CLOUD_CONFIG_ENABLED: false
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-member
          path: member/build/reports/tests/
          retention-days: 7
