# =============================================================================
# GitHub Actions CI 파이프라인
# =============================================================================
#
# [왜 GitHub Actions가 필요한가?]
#
# MSA 프로젝트는 서비스가 8개로 나뉘어 있어, 수동으로 모든 서비스를 빌드하고
# 테스트하는 것이 사실상 불가능합니다. GitHub Actions를 통해:
#
# 1. 자동 빌드 검증  — PR/Push 시 전체 서비스 컴파일 오류를 즉시 발견
# 2. 자동 테스트     — 코드 변경이 다른 서비스에 영향을 주는지 자동 확인
# 3. 변경 감지 빌드  — 변경된 서비스만 빌드하여 CI 시간 절약 (모노레포 최적화)
# 4. 팀 협업 품질    — main 브랜치에 깨진 코드가 병합되는 것을 방지
# 5. Docker 이미지   — 빌드 성공 시 컨테이너 이미지를 자동으로 생성/배포
#
# [파이프라인 흐름]
#
#   Push/PR → 변경 감지 → 빌드 & 테스트 (병렬) → Docker 이미지 빌드
#
# =============================================================================

name: CI Pipeline

# ---------------------------------------------------------------------------
# 트리거 설정
# - push: main 브랜치에 직접 push 시 실행
# - pull_request: main 대상 PR 생성/업데이트 시 실행
# - 불필요한 파일(docs, md) 변경은 CI를 건너뜀 → 리소스 절약
# ---------------------------------------------------------------------------
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'

# ---------------------------------------------------------------------------
# 동시 실행 제어
# - 같은 브랜치에서 새 push가 오면 이전 실행을 자동 취소
# - CI 리소스 낭비 방지 (빠르게 연속 push할 때 유용)
# ---------------------------------------------------------------------------
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Step 1: 변경된 서비스 감지
  # =========================================================================
  # MSA 모노레포에서는 8개 서비스 중 변경된 것만 빌드해야 효율적입니다.
  # 예: auction/ 폴더만 수정했으면 auction만 빌드하고 나머지는 건너뜁니다.
  # =========================================================================
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      # 각 서비스의 변경 여부를 output으로 내보냄 (true/false)
      apigateway: ${{ steps.filter.outputs.apigateway }}
      auction: ${{ steps.filter.outputs.auction }}
      config: ${{ steps.filter.outputs.config }}
      discovery: ${{ steps.filter.outputs.discovery }}
      member: ${{ steps.filter.outputs.member }}
      order: ${{ steps.filter.outputs.order }}
      payment: ${{ steps.filter.outputs.payment }}
      product: ${{ steps.filter.outputs.product }}
    steps:
      - uses: actions/checkout@v4

      # dorny/paths-filter: 파일 경로 기반으로 변경 감지하는 공식 액션
      # 각 서비스 폴더 내 파일이 변경되었는지 확인
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apigateway:
              - 'apigateway/**'
            auction:
              - 'auction/**'
            config:
              - 'config/**'
            discovery:
              - 'discovery/**'
            member:
              - 'member/**'
            order:
              - 'order/**'
            payment:
              - 'payment/**'
            product:
              - 'product/**'

  # =========================================================================
  # Step 2: 빌드 & 테스트 (Matrix 전략)
  # =========================================================================
  # matrix를 사용하여 8개 서비스를 병렬로 빌드합니다.
  # - 각 서비스는 독립적이므로 병렬 실행이 가능
  # - 하나가 실패해도 나머지는 계속 실행 (fail-fast: false)
  # - 변경된 서비스만 실행 (if 조건으로 필터링)
  # =========================================================================
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      fail-fast: false  # 한 서비스 실패 시 나머지도 중단할지 여부 (false = 계속 실행)
      matrix:
        # 빌드 대상 서비스 목록
        service:
          - apigateway
          - auction
          - config
          - discovery
          - member
          - order
          - payment
          - product

    # 변경된 서비스만 빌드 (detect-changes의 output 활용)
    # push 이벤트(main 병합)일 때는 전체 빌드
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs[matrix.service] == 'true'

    steps:
      # ----- 소스 체크아웃 -----
      - uses: actions/checkout@v4

      # ----- JDK 21 설정 -----
      # Temurin(Eclipse Adoptium)은 가장 널리 쓰이는 OpenJDK 배포판
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ----- Gradle 캐시 -----
      # 의존성을 캐시하여 빌드 시간을 대폭 단축 (첫 빌드 ~3분 → 캐시 후 ~1분)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # build.gradle이 변경되면 캐시를 갱신
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles(format('{0}/build.gradle', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.service }}-
            ${{ runner.os }}-gradle-

      # ----- Gradle Wrapper 실행 권한 -----
      - name: Grant execute permission for gradlew
        run: chmod +x ${{ matrix.service }}/gradlew

      # ----- 빌드 & 테스트 -----
      # build 태스크는 compileJava + test + jar 생성을 모두 포함
      - name: Build and Test
        working-directory: ${{ matrix.service }}
        run: ./gradlew build --no-daemon
        # --no-daemon: CI 환경에서는 데몬 불필요 (매번 새 환경이므로)

      # ----- 테스트 결과 리포트 -----
      # 테스트 실패 시에도 리포트를 업로드하여 원인 파악 가능
      - name: Upload test results
        if: always()  # 빌드 실패해도 실행
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/
          retention-days: 7  # 7일 후 자동 삭제 (저장 공간 절약)

      # ----- 빌드 산출물 업로드 -----
      # Docker 이미지 빌드 단계에서 사용할 JAR 파일
      - name: Upload build artifact
        if: github.event_name == 'push'  # main push 시에만 (PR에서는 불필요)
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ${{ matrix.service }}/build/libs/*.jar
          retention-days: 1

  # =========================================================================
  # Step 3: Docker 이미지 빌드 (main push 시에만)
  # =========================================================================
  # PR 단계에서는 빌드/테스트만, main 병합 후에만 Docker 이미지를 만듭니다.
  # 이미지를 GitHub Container Registry(ghcr.io)에 push합니다.
  #
  # [ghcr.io를 쓰는 이유]
  # - GitHub 계정만으로 사용 가능 (별도 Docker Hub 계정 불필요)
  # - Private 레포의 이미지도 GitHub 권한으로 관리
  # - GitHub Actions와 자연스럽게 연동
  # =========================================================================
  docker:
    name: Docker ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'  # main push 시에만 실행

    # ghcr.io에 push하기 위한 권한 설정
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - apigateway
          - auction
          - config
          - discovery
          - member
          - order
          - payment
          - product

    steps:
      - uses: actions/checkout@v4

      # ----- 빌드 산출물 다운로드 -----
      # build job에서 업로드한 JAR 파일을 가져옴
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-${{ matrix.service }}
          path: ${{ matrix.service }}/build/libs/

      # ----- GitHub Container Registry 로그인 -----
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # GitHub이 자동 제공하는 토큰

      # ----- Docker 메타데이터 생성 -----
      # 이미지 태그를 자동 생성: latest + git SHA (예: ghcr.io/minya8703/auction:a1b2c3d)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      # ----- Docker 이미지 빌드 & Push -----
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # =========================================================================
  # Step 4: 최종 상태 체크
  # =========================================================================
  # 모든 빌드가 성공했는지 하나의 job으로 집계합니다.
  # Branch Protection Rule에서 이 job만 필수로 설정하면
  # 개별 서비스 job을 일일이 등록할 필요가 없습니다.
  # =========================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: build
    if: always()  # 이전 job이 실패/스킵되어도 실행
    steps:
      - name: Check build results
        run: |
          # needs.build.result: success | failure | cancelled | skipped
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "::error::One or more services failed to build"
            exit 1
          fi
          echo "All services built successfully"
