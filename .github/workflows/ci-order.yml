# Order Service CI
name: CI - Order

on:
  push:
    branches: [ develop ]
    paths:
      - 'order/**'
  pull_request:
    branches: [ develop ]
    paths:
      - 'order/**'

concurrency:
  group: ci-order-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-order-${{ hashFiles('order/build.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-order-

      - name: Grant execute permission
        run: chmod +x order/gradlew

      - name: Build and Test
        working-directory: order
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-order
          path: order/build/reports/tests/
          retention-days: 7
