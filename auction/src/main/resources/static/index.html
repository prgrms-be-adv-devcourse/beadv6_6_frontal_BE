<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biddy Auction API Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; font-size: 24px; }
        h2 { color: #c9d1d9; margin-bottom: 12px; font-size: 18px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
        h3 { color: #8b949e; font-size: 14px; margin-bottom: 8px; }

        .container { max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .full { grid-column: 1 / -1; }

        .card {
            background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px;
        }

        label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 4px; margin-top: 8px; }
        input, select {
            width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d;
            border-radius: 6px; color: #c9d1d9; font-size: 14px;
        }
        input:focus, select:focus { outline: none; border-color: #58a6ff; }

        .btn {
            padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 14px; font-weight: 600; margin-top: 12px; margin-right: 8px;
        }
        .btn-primary { background: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-blue { background: #1f6feb; color: #fff; }
        .btn-blue:hover { background: #388bfd; }
        .btn-red { background: #da3633; color: #fff; }
        .btn-red:hover { background: #f85149; }
        .btn-gray { background: #30363d; color: #c9d1d9; }
        .btn-gray:hover { background: #484f58; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 12px; font-weight: 600;
        }
        .badge-live { background: #238636; color: #fff; }
        .badge-ended { background: #da3633; color: #fff; }
        .badge-ws { background: #1f6feb; color: #fff; }
        .badge-ws-off { background: #484f58; color: #8b949e; }

        .log-box {
            background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
            padding: 12px; height: 200px; overflow-y: auto; font-family: monospace;
            font-size: 13px; line-height: 1.6;
        }
        .log-bid { color: #3fb950; }
        .log-ended { color: #f85149; }
        .log-info { color: #58a6ff; }
        .log-error { color: #f85149; font-weight: bold; }
        .log-time { color: #484f58; }

        .feed-item {
            background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
            padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .feed-item:hover { border-color: #58a6ff; cursor: pointer; }
        .feed-name { font-weight: 600; color: #c9d1d9; }
        .feed-price { color: #3fb950; font-weight: 600; font-size: 16px; }
        .feed-meta { color: #8b949e; font-size: 12px; }

        .bid-row { display: flex; gap: 8px; align-items: end; }
        .bid-row input { flex: 1; }

        .result-box {
            background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
            padding: 12px; max-height: 300px; overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #8b949e; font-size: 12px; padding: 6px 8px; border-bottom: 1px solid #30363d; }
        td { padding: 6px 8px; font-size: 13px; border-bottom: 1px solid #21262d; }

        .ws-status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .ws-dot { width: 8px; height: 8px; border-radius: 50%; }
        .ws-dot-on { background: #3fb950; }
        .ws-dot-off { background: #484f58; }

        .current-bid-display {
            font-size: 32px; font-weight: 700; color: #3fb950; text-align: center;
            padding: 16px; background: #0d1117; border-radius: 8px; margin-bottom: 12px;
        }
        .bid-count-display { text-align: center; color: #8b949e; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Biddy Auction API Test Console</h1>

    <!-- Server Config -->
    <div class="card" style="margin-bottom: 20px;">
        <div style="display: flex; gap: 16px; align-items: end;">
            <div style="flex: 1;">
                <label>Server URL</label>
                <input type="text" id="serverUrl" value="http://localhost:8084">
            </div>
            <div style="width: 200px;">
                <label>User ID (X-User-Id)</label>
                <input type="number" id="userId" value="42">
            </div>
        </div>
    </div>

    <div class="grid">
        <!-- Left: Feed + Detail -->
        <div>
            <!-- Auction Feed -->
            <div class="card" style="margin-bottom: 20px;">
                <h2>Auction Feed</h2>
                <div style="display: flex; gap: 8px; align-items: end;">
                    <div style="flex: 1;">
                        <label>Status</label>
                        <select id="feedStatus">
                            <option value="">All</option>
                            <option value="LIVE">LIVE</option>
                            <option value="ENDED">ENDED</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Sort</label>
                        <select id="feedSort">
                            <option value="">latest</option>
                            <option value="ending">ending</option>
                            <option value="price">price</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Category</label>
                        <input type="text" id="feedCategory" placeholder="sneakers">
                    </div>
                    <button class="btn btn-primary" onclick="loadFeed()">Search</button>
                </div>
                <div id="feedResult" style="margin-top: 12px; max-height: 400px; overflow-y: auto;"></div>
            </div>

            <!-- Auction Detail -->
            <div class="card">
                <h2>Auction Detail</h2>
                <div style="display: flex; gap: 8px; align-items: end;">
                    <div style="flex: 1;">
                        <label>Auction ID</label>
                        <input type="text" id="detailAuctionId" placeholder="A-FNF97">
                    </div>
                    <button class="btn btn-blue" onclick="loadDetail()">Load</button>
                </div>
                <div id="detailResult" class="result-box" style="margin-top: 12px;"></div>
            </div>
        </div>

        <!-- Right: WebSocket + Bid -->
        <div>
            <!-- WebSocket -->
            <div class="card" style="margin-bottom: 20px;">
                <h2>WebSocket Live</h2>
                <div class="ws-status">
                    <div id="wsDot" class="ws-dot ws-dot-off"></div>
                    <span id="wsStatusText" class="badge badge-ws-off">Disconnected</span>
                </div>
                <div style="display: flex; gap: 8px; align-items: end;">
                    <div style="flex: 1;">
                        <label>Subscribe Auction ID</label>
                        <input type="text" id="wsAuctionId" placeholder="A-FNF97">
                    </div>
                    <button class="btn btn-blue" onclick="wsConnect()">Connect</button>
                    <button class="btn btn-red" onclick="wsDisconnect()">Disconnect</button>
                </div>

                <div id="currentBidDisplay" class="current-bid-display" style="margin-top: 16px;">--</div>
                <div id="bidCountDisplay" class="bid-count-display">Waiting for bids...</div>

                <h3 style="margin-top: 16px;">Event Log</h3>
                <div id="wsLog" class="log-box"></div>
                <button class="btn btn-gray" onclick="clearLog()" style="margin-top: 8px;">Clear Log</button>
            </div>

            <!-- Place Bid -->
            <div class="card" style="margin-bottom: 20px;">
                <h2>Place Bid</h2>
                <div class="bid-row">
                    <div style="flex: 1;">
                        <label>Auction ID</label>
                        <input type="text" id="bidAuctionId" placeholder="A-FNF97">
                    </div>
                    <div style="flex: 1;">
                        <label>Amount</label>
                        <input type="number" id="bidAmount" placeholder="520000">
                    </div>
                    <button class="btn btn-primary" onclick="placeBid()">Bid</button>
                </div>
                <div id="bidResult" class="result-box" style="margin-top: 12px; height: auto;"></div>
            </div>

            <!-- Bid History -->
            <div class="card">
                <h2>Bid History</h2>
                <div style="display: flex; gap: 8px; align-items: end;">
                    <div style="flex: 1;">
                        <label>Auction ID</label>
                        <input type="text" id="historyAuctionId" placeholder="A-FNF97">
                    </div>
                    <button class="btn btn-blue" onclick="loadBidHistory()">Load</button>
                </div>
                <div id="historyResult" class="result-box" style="margin-top: 12px;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    let stompClient = null;
    let currentSubscription = null;

    function getServer() { return document.getElementById('serverUrl').value; }
    function getUserId() { return document.getElementById('userId').value; }
    function formatPrice(n) { return n != null ? n.toLocaleString() + ' won' : '-'; }
    function formatTime(t) { return t ? new Date(t).toLocaleString('ko-KR') : '-'; }
    function now() { return new Date().toLocaleTimeString('ko-KR'); }

    // ==================== Auction Feed ====================
    async function loadFeed() {
        const params = new URLSearchParams();
        const status = document.getElementById('feedStatus').value;
        const sort = document.getElementById('feedSort').value;
        const category = document.getElementById('feedCategory').value;
        if (status) params.append('status', status);
        if (sort) params.append('sort', sort);
        if (category) params.append('category', category);

        try {
            const res = await fetch(`${getServer()}/api/v1/auctions?${params}`);
            const data = await res.json();
            renderFeed(data);
        } catch (e) {
            document.getElementById('feedResult').innerHTML =
                `<div class="log-error">Error: ${e.message}</div>`;
        }
    }

    function renderFeed(data) {
        const el = document.getElementById('feedResult');
        if (!data.content || data.content.length === 0) {
            el.innerHTML = '<div style="color:#8b949e; padding:12px;">No results</div>';
            return;
        }
        el.innerHTML = data.content.map(a => `
            <div class="feed-item" onclick="selectAuction('${a.auctionId}')">
                <div>
                    <div class="feed-name">${a.name || '-'}</div>
                    <div class="feed-meta">
                        ${a.brand || ''} ${a.edition || ''} |
                        <span class="badge ${a.status === 'LIVE' ? 'badge-live' : 'badge-ended'}">${a.status || 'LIVE'}</span>
                        | Bids: ${a.bidCount || 0} | Watchers: ${a.watcherCount || 0}
                    </div>
                    <div class="feed-meta">${a.auctionId} | Ends: ${formatTime(a.endsAt)}</div>
                </div>
                <div class="feed-price">${formatPrice(a.currentBid)}</div>
            </div>
        `).join('') + `<div style="color:#8b949e; font-size:12px; padding:8px;">
            Total: ${data.totalElements} | Page: ${data.number + 1}/${data.totalPages}</div>`;
    }

    function selectAuction(id) {
        document.getElementById('detailAuctionId').value = id;
        document.getElementById('wsAuctionId').value = id;
        document.getElementById('bidAuctionId').value = id;
        document.getElementById('historyAuctionId').value = id;
        loadDetail();
    }

    // ==================== Auction Detail ====================
    async function loadDetail() {
        const id = document.getElementById('detailAuctionId').value;
        if (!id) return;

        try {
            const res = await fetch(`${getServer()}/api/v1/auctions/${id}`);
            const data = await res.json();
            renderDetail(data);
        } catch (e) {
            document.getElementById('detailResult').innerHTML =
                `<div class="log-error">Error: ${e.message}</div>`;
        }
    }

    function renderDetail(d) {
        document.getElementById('detailResult').innerHTML = `
            <table>
                <tr><th>Auction ID</th><td>${d.auctionId}</td></tr>
                <tr><th>Name</th><td>${d.name || '-'}</td></tr>
                <tr><th>Brand / Edition</th><td>${d.brand || '-'} / ${d.edition || '-'}</td></tr>
                <tr><th>Status</th><td><span class="badge ${d.status === 'LIVE' ? 'badge-live' : 'badge-ended'}">${d.status}</span></td></tr>
                <tr><th>Start Price</th><td>${formatPrice(d.startPrice)}</td></tr>
                <tr><th>Min Increment</th><td>${formatPrice(d.minIncrement)}</td></tr>
                <tr><th>Current Bid</th><td style="color:#3fb950; font-weight:bold;">${formatPrice(d.currentBid)}</td></tr>
                <tr><th>Bid Count</th><td>${d.bidCount}</td></tr>
                <tr><th>Watcher Count</th><td>${d.watcherCount}</td></tr>
                <tr><th>Ends At</th><td>${formatTime(d.endsAt)}</td></tr>
                <tr><th>Top Bidder</th><td>${d.topBidder ? d.topBidder.collectorId : '-'}</td></tr>
            </table>
        `;
    }

    // ==================== WebSocket ====================
    function wsConnect() {
        const auctionId = document.getElementById('wsAuctionId').value;
        if (!auctionId) { alert('Auction ID required'); return; }

        if (stompClient && stompClient.connected) {
            wsDisconnect();
        }

        const socket = new SockJS(`${getServer()}/ws`);
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // disable debug logs

        stompClient.connect({}, () => {
            setWsStatus(true);
            appendLog('info', `Connected. Subscribing to /topic/auctions/${auctionId}`);

            currentSubscription = stompClient.subscribe(
                `/topic/auctions/${auctionId}`,
                (message) => {
                    const data = JSON.parse(message.body);
                    handleWsMessage(data);
                }
            );
        }, (error) => {
            setWsStatus(false);
            appendLog('error', `Connection failed: ${error}`);
        });
    }

    function wsDisconnect() {
        if (currentSubscription) {
            currentSubscription.unsubscribe();
            currentSubscription = null;
        }
        if (stompClient) {
            stompClient.disconnect(() => {
                setWsStatus(false);
                appendLog('info', 'Disconnected');
            });
            stompClient = null;
        }
    }

    function handleWsMessage(data) {
        if (data.type === 'BID') {
            document.getElementById('currentBidDisplay').textContent = formatPrice(data.currentBid);
            document.getElementById('bidCountDisplay').textContent =
                `Bid #${data.bidCount} by User ${data.bidderId}`;
            appendLog('bid',
                `BID | ${formatPrice(data.currentBid)} | Count: ${data.bidCount} | Bidder: ${data.bidderId}`);
        } else if (data.type === 'ENDED') {
            if (data.winnerId) {
                document.getElementById('currentBidDisplay').textContent = formatPrice(data.finalBid);
                document.getElementById('bidCountDisplay').textContent =
                    `SOLD to User ${data.winnerId}`;
                appendLog('ended',
                    `ENDED (SOLD) | Winner: ${data.winnerId} | Final: ${formatPrice(data.finalBid)}`);
            } else {
                document.getElementById('currentBidDisplay').textContent = 'UNSOLD';
                document.getElementById('bidCountDisplay').textContent = 'No bids';
                appendLog('ended', `ENDED (UNSOLD) | No bids`);
            }
        }
    }

    function setWsStatus(connected) {
        document.getElementById('wsDot').className = `ws-dot ${connected ? 'ws-dot-on' : 'ws-dot-off'}`;
        document.getElementById('wsStatusText').className = `badge ${connected ? 'badge-ws' : 'badge-ws-off'}`;
        document.getElementById('wsStatusText').textContent = connected ? 'Connected' : 'Disconnected';
    }

    function appendLog(type, msg) {
        const el = document.getElementById('wsLog');
        const cls = type === 'bid' ? 'log-bid' : type === 'ended' ? 'log-ended' :
                    type === 'error' ? 'log-error' : 'log-info';
        el.innerHTML += `<div><span class="log-time">[${now()}]</span> <span class="${cls}">${msg}</span></div>`;
        el.scrollTop = el.scrollHeight;
    }

    function clearLog() {
        document.getElementById('wsLog').innerHTML = '';
        document.getElementById('currentBidDisplay').textContent = '--';
        document.getElementById('bidCountDisplay').textContent = 'Waiting for bids...';
    }

    // ==================== Place Bid ====================
    async function placeBid() {
        const auctionId = document.getElementById('bidAuctionId').value;
        const amount = parseInt(document.getElementById('bidAmount').value);
        if (!auctionId || !amount) { alert('Auction ID and Amount required'); return; }

        try {
            const res = await fetch(`${getServer()}/api/v1/auctions/${auctionId}/bids`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-User-Id': getUserId()
                },
                body: JSON.stringify({ amount })
            });
            const data = await res.json();

            if (res.ok) {
                document.getElementById('bidResult').innerHTML = `
                    <div style="color:#3fb950; font-weight:bold; margin-bottom:8px;">Bid Placed Successfully!</div>
                    <table>
                        <tr><th>Bid ID</th><td>${data.bidId}</td></tr>
                        <tr><th>Amount</th><td>${formatPrice(data.amount)}</td></tr>
                        <tr><th>Current Bid</th><td style="color:#3fb950;">${formatPrice(data.currentBid)}</td></tr>
                        <tr><th>Bid Count</th><td>${data.bidCount}</td></tr>
                    </table>
                `;
            } else {
                document.getElementById('bidResult').innerHTML = `
                    <div style="color:#f85149; font-weight:bold;">Error ${res.status}</div>
                    <div style="color:#8b949e; margin-top:4px;">${data.code || ''}: ${data.message || JSON.stringify(data)}</div>
                `;
            }
        } catch (e) {
            document.getElementById('bidResult').innerHTML =
                `<div class="log-error">Error: ${e.message}</div>`;
        }
    }

    // ==================== Bid History ====================
    async function loadBidHistory() {
        const id = document.getElementById('historyAuctionId').value;
        if (!id) return;

        try {
            const res = await fetch(`${getServer()}/api/v1/auctions/${id}/bids`);
            const data = await res.json();
            renderBidHistory(data);
        } catch (e) {
            document.getElementById('historyResult').innerHTML =
                `<div class="log-error">Error: ${e.message}</div>`;
        }
    }

    function renderBidHistory(data) {
        const el = document.getElementById('historyResult');
        if (!data.content || data.content.length === 0) {
            el.innerHTML = '<div style="color:#8b949e; padding:12px;">No bids yet</div>';
            return;
        }
        el.innerHTML = `
            <table>
                <tr><th>#</th><th>Bidder</th><th>Amount</th><th>Time</th></tr>
                ${data.content.map((b, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${b.bidder ? b.bidder.collectorId : '-'}</td>
                        <td style="color:#3fb950; font-weight:bold;">${formatPrice(b.amount)}</td>
                        <td>${formatTime(b.bidAt)}</td>
                    </tr>
                `).join('')}
            </table>
            <div style="color:#8b949e; font-size:12px; padding:8px;">Total: ${data.totalElements}</div>
        `;
    }
</script>
</body>
</html>
