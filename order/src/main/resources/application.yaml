server:
  port: 8083

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${ORDER_DB:biddy_order}
    username: ${POSTGRES_USER:biddy}
    password: ${POSTGRES_PASSWORD:biddy1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
kafka:
  enabled: true

# 서비스 호출을 위한 설정
product-service:
  url: http://localhost:8082

api:
  init: /api

order:
  batch:
    expiration-cron: "0 */5 * * * *" # Every 5 minutes
    purchase-confirmation-cron: "0 0 2 * * *" # Every day at 2 AM

